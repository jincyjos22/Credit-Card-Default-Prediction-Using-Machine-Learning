<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Default Predictor</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #fff;
            padding: 30px;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-in-out;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            margin-top: 10px;
            display: block;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #4CAF50;
            outline: none;
            box-shadow: 0 0 5px rgba(76,175,80,0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #4CAF50, #2E7D32);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
        }

        .high {
            background: #ffebee;
            color: #c62828;
        }

        .low {
            background: #e8f5e9;
            color: #2e7d32;
        }

        small {
            color: #777;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="container">

    <h2>💳 Credit Card Default Predictor</h2>

    <form action="/predict" method="post">

        <label>Credit Limit</label>
        <input type="number" name="LIMIT_BAL" placeholder="e.g. 50000" required>

        <label>Age</label>
        <input type="number" name="AGE" placeholder="e.g. 30" required>

        <label>Payment Status (Last Month)</label>
        <select name="PAY_0" required>
            <option value="0">Paid on time</option>
            <option value="1">1 month delay</option>
            <option value="2">2 months delay</option>
            <option value="3">3+ months delay</option>
        </select>

        <label>Last Month Bill Amount</label>
        <input type="number" name="BILL_AMT1" placeholder="e.g. 10000" required>

        <label>Last Month Payment</label>
        <input type="number" name="PAY_AMT1" placeholder="e.g. 8000" required>

        <label>Total Payment (6 months)</label>
        <input type="number" name="TOTAL_PAY" placeholder="e.g. 45000" required>

        <button type="submit">Predict Risk</button>
    </form>

    {% if prediction_text %}
<div class="result {{ color_class }}">
    {{ prediction_text }}
</div>
{% endif %}
</div>

</body>
</html>
