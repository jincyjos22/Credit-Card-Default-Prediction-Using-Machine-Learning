<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Default Predictor</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        small {
            color: gray;
        }

        h3 {
            text-align: center;
            color: blue;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Credit Card Default Prediction</h2>

    <form action="/predict" method="post">

        <label>Credit Limit:</label>
        <input type="number" name="LIMIT_BAL" placeholder="e.g. 50000" required>

        <label>Age:</label>
        <input type="number" name="AGE" placeholder="e.g. 30" required>

        <label>Repayment Status (Last Month):</label>
        <small>(Select based on your last payment)</small>
        <select name="PAY_0" required>
            <option value="0">Paid on time</option>
            <option value="1">1 month delay</option>
            <option value="2">2 months delay</option>
            <option value="3">3+ months delay</option>
        </select>

        <label>Last Month Bill Amount:</label>
        <input type="number" name="BILL_AMT1" placeholder="e.g. 10000" required>

        <label>Amount Paid Last Month:</label>
        <input type="number" name="PAY_AMT1" placeholder="e.g. 8000" required>

        <label>Total Payment (Last 6 Months):</label>
        <small>(Approximate total you paid in last 6 months)</small>
        <input type="number" name="TOTAL_PAY" placeholder="e.g. 45000" required>

        <button type="submit">Predict</button>

    </form>

    <h3>{{ prediction_text }}</h3>

</div>

</body>
</html>
